[*]
host = 127.0.0.1
port = 8080
n-gpu-layers = -1
flash-attn = true
mlock = true
threads = 14
threads-batch = 14

[01-qwen3-6-35b-a3b]
model = ~/opt/models/unsloth/qwen3-6-35b-a3b-gguf/qwen3-6-35b-a3b-q4-k-m.gguf
parallel = 1
no-context-shift = true
load-on-startup = true
jinja = true

# Performance
batch-size = 8192
ubatch-size = 2048
ctx-size = 262144
cache-type-k = q8_0
cache-type-v = q8_0
cache-ram = 6144

# Sampling
temp = 0.7
top-p = 0.95
min-p = 0.05
top-k = 20
repeat-penalty = 1.05
