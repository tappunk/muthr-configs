# Lima configuration for running Nous Research Hermes Agent
# Compatible with limactl v2.1.2+

images:
  - location: "https://cloud.debian.org/images/cloud/trixie/20260525-2489/debian-13-genericcloud-arm64-20260525-2489.qcow2"
    arch: "aarch64"
    digest: "sha512:b4f9240559da2c044953418d0632cee4d45e3d447a0ec6a9129ef7946e39ec4135ec9e085c176f8dc77af6536d7279c03487e9aa61fd6c628fb493886e23aef5"
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-genericcloud-arm64-daily.qcow2"
    arch: "aarch64"

cpus: 1
memory: "3GiB"
disk: "50GiB"

upgradePackages: true

containerd:
  user: true

ssh:
  forwardAgent: false

hostResolver:
  enabled: true
  ipv6: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      export DEBIAN_FRONTEND=noninteractive

      echo "Updating package lists..."
      apt-get update

      echo "Safe-upgrading system packages..."
      apt-get upgrade -y -o Dpkg::Options::="--force-confold"

      echo "Installing Hermes system prerequisites..."
      apt-get install -y \
        curl git ripgrep ffmpeg build-essential \
        ca-certificates gnupg ncurses-term

      # Ghostty terminfo (only if ghostty is installed)
      if command -v ghostty >/dev/null 2>&1; then
          mkdir -p /lib/terminfo/x
          [ -f /usr/share/terminfo/g/ghostty ] && \
              ln -sf /usr/share/terminfo/g/ghostty /lib/terminfo/x/xterm-ghostty
      fi

      echo "Base VM provisioning complete"

  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      export DEBIAN_FRONTEND=noninteractive

      echo "Installing Node.js v22 via NVM (required for gateway messaging platforms)..."
      curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      nvm install 22
      nvm alias default 22

      echo "Installing Python and uv package manager..."
      curl -LsSf https://astral.sh/uv/install.sh | sh

      echo "Downloading and running official Hermes Agent installation script..."
      # The installer creates python virtual environments, registers the global `hermes` command, and builds target paths in ~/.hermes/
      curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash

probes:
  - script: |
      #!/bin/bash
      set -euo pipefail
      echo "Checking if Hermes Agent command is available..."
      # Added ~/.cargo/bin to the probe path because astral/uv installs its binary there by default
      export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
      command -v hermes >/dev/null 2>&1
    description: "Waiting for Hermes Agent installation to finish"
    hint: "The initial provisioning step takes a couple of minutes to set up Python, Node.js, and the Hermes core environment."
