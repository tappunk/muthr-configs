# Hermes Agent CLI Configuration Template
# Token variables substituted by provision.d/hermes-agent.sh at deploy time:
#   {{MUTHR_OPENAI_URL}}      - inference engine endpoint (e.g., http://host.lima.internal:8080/v1)
#   {{MUTHR_MODEL_NAME}}      - model identifier from active preset
#   {{MUTHR_WORKSPACE_MOUNT}} - workspace path inside VM

model:
  default: "{{MUTHR_MODEL_NAME}}"
  provider: "custom"
  base_url: "{{MUTHR_OPENAI_URL}}"

providers:
  custom:
    request_timeout_seconds: 300

terminal:
  backend: "local"
  cwd: "."
  timeout: 180
  home_mode: "auto"

agent:
  max_turns: 60
  verbose: false

mcp_servers:
  memory:
    command: mcp-server-memory
    args: []
  filesystem:
    command: mcp-server-filesystem
    args: ["{{MUTHR_WORKSPACE_MOUNT}}"]

session_reset:
  mode: both
  idle_minutes: 1440
